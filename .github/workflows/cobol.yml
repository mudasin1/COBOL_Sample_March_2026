name: COBOL build and tests

on:
  push:
  pull_request:

jobs:
  gnu-cobol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol

      - name: Build and test
        run: |
          make clean
          make test
